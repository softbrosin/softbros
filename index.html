<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Softbros | Start up - Software company</title>
</head>
<style>
  img {
    width: 80px;
    position: relative;
    justify-content: center;
    animation: dance 4s;
    text-align: center;
    margin: auto;
    align-items: center;
    left: 44%;
    top: 300px;
  }
  h1{
    text-align: center;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #363636;
    font-weight: 700;
    position: relative;
    top: 280px;
    animation-delay: 2s;


  }
  main{
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
  }
  @keyframes dance {
    from{opacity: 0;}
    to{opacity: 1;}
  }
</style>
<body>
  <main>
    <img src="textBrand.svg" alt="Softbros logo">
    <h1>Softbros</h1>
  </main>
</body>
</html>
